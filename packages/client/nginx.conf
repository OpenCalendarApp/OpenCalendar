limit_req_zone $binary_remote_addr zone=api_public_read:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_public_write:10m rate=10r/m;

server {
  listen 80;
  limit_req_status 429;

  location ~ ^/api/(v1/)?schedule/(book|reschedule|cancel)/ {
    limit_req zone=api_public_write burst=8 nodelay;
    proxy_pass __API_UPSTREAM__;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location ~ ^/api/(v1/)?schedule/ {
    limit_req zone=api_public_read burst=30 nodelay;
    proxy_pass __API_UPSTREAM__;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/ {
    proxy_pass __API_UPSTREAM__;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript;
}
