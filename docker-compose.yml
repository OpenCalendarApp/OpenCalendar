services:
  postgres:
    image: postgres:16-alpine
    container_name: session-scheduler-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-session_scheduler}
      POSTGRES_USER: ${POSTGRES_USER:-ss_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ss_admin} -d ${POSTGRES_DB:-session_scheduler}"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: session-scheduler-server
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://ss_admin:change-me@postgres:5432/session_scheduler}
      JWT_SECRET: ${JWT_SECRET:-development-secret}
      PORT: ${PORT:-4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    container_name: session-scheduler-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  pg_data:
