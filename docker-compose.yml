services:
  postgres:
    image: postgres:16-alpine
    container_name: session-scheduler-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-session_scheduler}
      POSTGRES_USER: ${POSTGRES_USER:-ss_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ss_admin} -d ${POSTGRES_DB:-session_scheduler}"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: session-scheduler-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://ss_admin:change-me@postgres:5432/session_scheduler}
      JWT_SECRET: ${JWT_SECRET:-development-secret}
      PORT: ${PORT:-4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      PUBLIC_RATE_LIMIT_WINDOW_MS: ${PUBLIC_RATE_LIMIT_WINDOW_MS:-60000}
      PUBLIC_READ_RATE_LIMIT_MAX: ${PUBLIC_READ_RATE_LIMIT_MAX:-120}
      PUBLIC_WRITE_RATE_LIMIT_MAX: ${PUBLIC_WRITE_RATE_LIMIT_MAX:-30}
      BOOKING_IDEMPOTENCY_TTL_HOURS: ${BOOKING_IDEMPOTENCY_TTL_HOURS:-24}
      JOB_QUEUE_POLL_INTERVAL_MS: ${JOB_QUEUE_POLL_INTERVAL_MS:-1000}
      JOB_QUEUE_MAX_ATTEMPTS: ${JOB_QUEUE_MAX_ATTEMPTS:-5}
      JOB_QUEUE_BACKOFF_BASE_MS: ${JOB_QUEUE_BACKOFF_BASE_MS:-5000}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@session-scheduler.local}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BOOKING_PORTAL_BASE_URL: ${BOOKING_PORTAL_BASE_URL:-http://localhost:3000}
      EMAIL_QUEUE_FORCE_FAILURE: ${EMAIL_QUEUE_FORCE_FAILURE:-false}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health/live').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    container_name: session-scheduler-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pg_data:
