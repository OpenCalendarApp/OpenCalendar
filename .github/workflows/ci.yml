name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck shared
        run: npx tsc --noEmit -p packages/shared/tsconfig.json

      - name: Typecheck server
        run: npx tsc --noEmit -p packages/server/tsconfig.json

      - name: Typecheck client
        run: npx tsc --noEmit -p packages/client/tsconfig.json

      - name: Run server tests
        run: npm run test -w @opencalendar/server
